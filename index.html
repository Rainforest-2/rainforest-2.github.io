<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>にゃんこ風モバイルバトル</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="gameCanvas" aria-label="にゃんこ風バトル"></canvas>

      <section id="hudTop" class="hud-top">
        <div class="stage-label">長崎県</div>
        <div class="money-label" id="moneyText">0 / 0円</div>
      </section>

      <section id="uiBar" class="ui-bar" aria-label="モバイル操作UI">
        <button id="walletBtn" class="round-btn wallet-btn" type="button" aria-label="働きネコレベルアップ">
          <span class="title">LEVEL</span>
          <span class="value" id="walletLevel">1</span>
        </button>

        <div id="slotScroller" class="slot-scroller" aria-label="生産スロット"></div>

        <button id="cannonBtn" class="round-btn cannon-btn" type="button" aria-label="にゃんこ砲">
          <span class="title">砲</span>
          <span class="value" id="cannonState">0%</span>
        </button>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
